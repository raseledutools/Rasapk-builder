<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RasFocus Pro - Premium Dashboard</title>
    <style>
        :root {
            --bg-main: #F4F7FB; --bg-card: #FFFFFF;
            --text-dark: #0F172A; --text-gray: #64748B; --text-light: #94A3B8;
            --primary: #4F46E5; --primary-light: #EEF2FF;
            --accent-purple: #8B5CF6; --accent-purple-light: #F5F3FF;
            --accent-blue: #3B82F6; --accent-blue-light: #EFF6FF;
            --warning: #D97706; --warning-light: #FFFBEB;
            --danger: #E11D48; --danger-light: #FFF1F2;
            --success: #10B981;
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.06);
            --radius-lg: 28px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { background-color: var(--bg-main); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; width: 100vw; height: 100vh; overflow: hidden; }

        .app-container { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* Notification Bar */
        .persistent-notif { background: var(--success); color: white; font-size: 12px; font-weight: 700; text-align: center; padding: 6px 10px; display: flex; justify-content: center; align-items: center; gap: 8px; z-index: 100; }

        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 110px; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        .header { background: linear-gradient(135deg, #312E81 0%, #4F46E5 100%); padding: 40px 20px 35px; border-bottom-left-radius: 36px; border-bottom-right-radius: 36px; color: white; box-shadow: var(--shadow-md); }
        .greeting { font-size: 13px; font-weight: 500; opacity: 0.85; text-transform: uppercase; letter-spacing: 1px; }
        .title { font-size: 26px; font-weight: 800; margin-top: 4px; }

        .content { padding: 0 18px; margin-top: -20px; position: relative; z-index: 5; }
        .card { background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-md); margin-bottom: 16px; }

        .section-title { font-size: 15px; font-weight: 700; color: var(--text-dark); margin: 24px 0 12px 6px; }

        .list-card { padding: 8px 20px; }
        .list-item { display: flex; align-items: center; padding: 16px 0; border-bottom: 1px solid #F1F5F9; }
        .list-item:last-child { border-bottom: none; }
        .item-content { flex: 1; margin-left: 15px;}
        .item-title { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 3px;}
        
        .switch { width: 48px; height: 28px; background: #E2E8F0; border-radius: 30px; position: relative; cursor: pointer; transition: 0.3s; }
        .switch.on { background: var(--success); }
        .switch::after { content: ''; position: absolute; width: 22px; height: 22px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .switch.on::after { transform: translateX(20px); }

        /* Custom Keywords Section */
        .custom-kw-section { margin-top: 15px; background: #F8FAFC; padding: 15px; border-radius: 16px; border: 1px solid #E2E8F0;}
        .kw-input-group { display: flex; gap: 10px; margin-bottom: 15px;}
        .kw-input { flex: 1; padding: 10px 15px; border: 1px solid #CBD5E1; border-radius: 12px; font-size: 14px; outline: none; }
        .kw-btn { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 0 20px; font-weight: 700; cursor: pointer; }
        .kw-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .kw-tag { background: white; border: 1px solid #CBD5E1; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px;}
        .kw-del { color: var(--danger); cursor: pointer; font-size: 16px; font-weight: bold; line-height: 1;}
    </style>
</head>
<body>
    <div class="app-container">
        
        <div class="persistent-notif">
            ⏱️ Active Time: <span id="liveRunTime">0h 0m</span> | Blocked: <span id="liveBlockCount">0</span>
        </div>

        <div class="scroll-area">
            <div class="header">
                <div class="greeting">Welcome Back</div>
                <div class="title">RasFocus Pro</div>
            </div>

            <div class="content">
                <div class="section-title">Protection Controls</div>
                <div class="card list-card">
                    
                    <div class="list-item">
                        <div class="item-content">
                            <div class="item-title">Block Keywords</div>
                            <div style="font-size:12px; color:gray;">Block bad words in search/chat</div>
                        </div>
                        <div class="switch" id="blockKeywords"></div>
                    </div>

                    <div class="custom-kw-section" id="customKwSection" style="display: none;">
                        <div class="kw-input-group">
                            <input type="text" id="kwInput" class="kw-input" placeholder="Type word (e.g. game)">
                            <button id="kwAddBtn" class="kw-btn">Add</button>
                        </div>
                        <div class="kw-list" id="kwList"></div>
                    </div>
                    
                    <div class="list-item">
                        <div class="item-content">
                            <div class="item-title">Block 18+ Content</div>
                        </div>
                        <div class="switch" id="blockAdult"></div>
                    </div>

                    <div class="list-item">
                        <div class="item-content">
                            <div class="item-title">Block Reels/Shorts</div>
                        </div>
                        <div class="switch" id="blockShorts"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { registerPlugin } from '@capacitor/core';
        const AppBlocker = registerPlugin('AppBlocker');

        document.addEventListener('DOMContentLoaded', () => {

            // --- 1. Notification Time & Count ---
            let startTime = localStorage.getItem('appStartTime');
            if (!startTime) {
                startTime = Date.now();
                localStorage.setItem('appStartTime', startTime);
            }

            setInterval(() => {
                let diff = Date.now() - parseInt(startTime);
                let hours = Math.floor(diff / (1000 * 60 * 60));
                let mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('liveRunTime').innerText = `${hours}h ${mins}m`;
            }, 60000); 
            // Call immediately once
            let diff = Date.now() - parseInt(startTime);
            document.getElementById('liveRunTime').innerText = `${Math.floor(diff / 3600000)}h ${Math.floor((diff % 3600000) / 60000)}m`;

            // --- 2. Custom Keywords Logic ---
            const kwInput = document.getElementById('kwInput');
            const kwAddBtn = document.getElementById('kwAddBtn');
            const kwListDiv = document.getElementById('kwList');
            const customKwSection = document.getElementById('customKwSection');
            
            let customKeywords = JSON.parse(localStorage.getItem('customKeywords') || '[]');

            function renderKeywords() {
                kwListDiv.innerHTML = '';
                customKeywords.forEach((kw, index) => {
                    const tag = document.createElement('div');
                    tag.className = 'kw-tag';
                    tag.innerHTML = `${kw} <span class="kw-del" data-index="${index}">&times;</span>`;
                    kwListDiv.appendChild(tag);
                });
                sendSettingsToJava();
            }

            kwAddBtn.addEventListener('click', () => {
                const word = kwInput.value.trim().toLowerCase();
                if (word && !customKeywords.includes(word)) {
                    customKeywords.push(word);
                    localStorage.setItem('customKeywords', JSON.stringify(customKeywords));
                    kwInput.value = '';
                    renderKeywords();
                }
            });

            kwListDiv.addEventListener('click', (e) => {
                if (e.target.classList.contains('kw-del')) {
                    const idx = e.target.getAttribute('data-index');
                    customKeywords.splice(idx, 1);
                    localStorage.setItem('customKeywords', JSON.stringify(customKeywords));
                    renderKeywords();
                }
            });

            // Initial Render
            renderKeywords();

            // --- 3. Toggles Logic ---
            const toggles = {
                blockKeywords: { el: document.getElementById('blockKeywords') },
                blockAdult: { el: document.getElementById('blockAdult') },
                blockShorts: { el: document.getElementById('blockShorts') }
            };

            for (const key in toggles) {
                if (localStorage.getItem(key) === 'true') {
                    toggles[key].el.classList.add('on');
                    if(key === 'blockKeywords') customKwSection.style.display = 'block';
                }
                
                toggles[key].el.addEventListener('click', async function() {
                    this.classList.toggle('on');
                    const isOn = this.classList.contains('on');
                    localStorage.setItem(key, isOn);
                    
                    if(key === 'blockKeywords') {
                        customKwSection.style.display = isOn ? 'block' : 'none';
                    }
                    
                    sendSettingsToJava();
                });
            }

            // --- 4. Send Data to Java Native ---
            async function sendSettingsToJava() {
                const currentSettings = {
                    blockKeywords: document.getElementById('blockKeywords').classList.contains('on'),
                    adultContent: document.getElementById('blockAdult').classList.contains('on'),
                    blockReelsShorts: document.getElementById('blockShorts').classList.contains('on'),
                    customKeywordsList: JSON.stringify(customKeywords) // কাস্টম শব্দগুলো জাভাতে পাঠানো হচ্ছে
                };

                console.log("Sending to Java: ", currentSettings);
                try {
                    await AppBlocker.updateSettings(currentSettings);
                } catch (e) { console.log("Plugin not loaded"); }
            }
        });
    </script>
</body>
</html>
